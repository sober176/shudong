<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名树洞</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主内容区，默认高斯模糊 -->
    <div class="main-content blurred">
        <div class="container">
            <header>
                <h1>匿名树洞</h1>
                <!-- 用户状态信息（登录后显示） -->
                    <div id="user-status" style="display: none;">
                        <span id="user-name" class="user-name"></span>
                        <span id="credits-badge" class="credits-badge">🔋 能量: 0</span>
                        <button id="logout-btn" class="logout-btn">退出登录</button>
                    </div>
            </header>
            
            <main>
                <section class="input-section">
                    <!-- AI专属治愈框 -->
                    <div id="ai-whisper-box" class="ai-whisper-box" style="display: none;">
                        <div class="ai-whisper-content">
                            <div class="ai-whisper-loading">✨ 治愈师正在感知你的情绪...</div>
                            <div class="ai-whisper-reply" id="ai-whisper-reply"></div>
                            <!-- 充值弹窗 -->
                            <div id="recharge-card" class="recharge-card" style="display: none;">
                                <div class="recharge-content">
                                    <h3>✨ 治愈师的能量已耗尽</h3>
                                    <p>如果你喜欢这个树洞，请作者喝杯咖啡，即可补满 100 个能量币继续倾诉。</p>
                                    <div class="payment-placeholder">☕</div>
                                    
                                    <!-- 重要提示 -->
                                    <div class="recharge-warning">
                                        <strong style="color: red; font-size: 16px;">请在支付页面的【留言】框内，务必填写你的当前登录邮箱：</strong>
                                        <span id="current-email" style="color: red; font-weight: bold;">[邮箱将自动显示]</span>
                                    </div>
                                    
                                    <!-- 爱发电链接按钮 -->
                                    <a href="https://ifdian.net/order/create?plan_id=f4b7b868210511f1b7ee5254001e7c00&product_type=0&remark=&affiliate_code=" target="_blank" class="afdian-btn">
                                        去『爱发电』赞赏 5 元充值
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <textarea id="message-input" placeholder="写下你的心事..." rows="4"></textarea>
                    <button id="send-btn">发送</button>
                </section>
                
                <section class="messages-section">
                    <div id="messages-container"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- 中央登录卡片 -->
    <div id="auth-card" class="auth-card">
        <div class="auth-card-content">
            <h2 class="auth-card-title">欢迎来到匿名树洞</h2>
            <p class="auth-card-subtitle">请先验证身份</p>
            <form id="auth-form" class="auth-form">
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="邮箱" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="密码" required>
                </div>
                <button type="submit" id="auth-submit" class="auth-btn">登录/注册</button>
            </form>
        </div>
    </div>
    
    <!-- 主 CDN: jsdelivr -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 备用 CDN: unpkg -->
    <script>
        window.addEventListener('load', function() {
            if (typeof supabase === 'undefined') {
                console.log('jsdelivr CDN 加载失败，尝试 unpkg CDN...');
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/@supabase/supabase-js@2';
                document.head.appendChild(script);
            }
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
